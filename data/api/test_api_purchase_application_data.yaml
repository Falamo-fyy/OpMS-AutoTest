# 采购申请查询接口测试数据

# 默认查询条件（全空，返回全部数据）
query_default:
  description: "默认条件查询采购申请列表"
  params:
    pageNum: 1
    pageSize: 10
  body:
    applicationNo: ""
    urgencyLevel: ""
    applicationItem: ""
    department: ""
    creator: ""
    auditStatus: ""
    applicationStartDate: ""
    applicationEndDate: ""
    isAuditStatus: false

# 按紧急程度筛选
query_by_urgency:
  description: "按紧急程度筛选采购申请"
  params:
    pageNum: 1
    pageSize: 10
  body:
    # 申请编号
    applicationNo: ""
    # 紧急程度：普通、紧急、非常紧急
    urgencyLevel: "普通"
    # 申请项目
    applicationItem: ""
    # 使用科室
    department: ""
    # 申请人
    creator: ""
    # 审核状态：已提交、已批准、已拒绝、审核中、待定
    auditStatus: ""
    # yyyy-MM-dd 格式的时间范围
    applicationStartDate: ""
    applicationEndDate: ""
    # 审核模式
    isAuditStatus: false

# 按审核状态筛选
query_by_audit_status:
  description: "按审核状态筛选采购申请"
  params:
    pageNum: 1
    pageSize: 10
  body:
    applicationNo: ""
    urgencyLevel: ""
    applicationItem: ""
    department: ""
    creator: ""
    auditStatus: ""
    applicationStartDate: ""
    applicationEndDate: ""
    isAuditStatus: true

# 按申请编号精确查询
query_by_application_no:
  description: "按申请编号精确查询采购申请"
  params:
    pageNum: 1
    pageSize: 10
  body:
    applicationNo: "PA202603250007"
    urgencyLevel: ""
    applicationItem: ""
    department: ""
    creator: ""
    auditStatus: ""
    applicationStartDate: ""
    applicationEndDate: ""
    isAuditStatus: false

# 不携带 token 查询
query_no_token:
  description: "不携带 token 查询采购申请"

# 携带无效 token 查询
query_invalid_token:
  description: "携带无效 token 查询采购申请"
